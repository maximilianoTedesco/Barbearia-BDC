<!-- SOMENTE A PARTE IMPORTANTE AJUSTADA -->

<!-- CARD FILTROS (SEM id) -->
<div class="card">
  <h2>Filtros</h2>

  <div class="filters">
    <div>
      <label>Data</label>
      <input type="date" id="filterDate" />
    </div>

    <div>
      <label>Barbeiro</label>
      <select id="filterBarber">
        <option value="">Todos</option>
        <option value="1f39cf56-9a40-42ee-a968-56f1537b47c3">Brunin</option>
        <option value="766b291c-4b4f-47ad-89e5-7893b1af0d28">Guilherme</option>
      </select>
    </div>

    <div>
      <label>Status</label>
      <select id="filterStatus">
        <option value="">Todos</option>
        <option value="scheduled">Agendado</option>
        <option value="cancelled">Cancelado</option>
      </select>
    </div>

    <button type="button" class="btn-primary" onclick="loadAppointments()">
      Buscar
    </button>
  </div>
</div>

<!-- CARD RESULTADO (AGORA CORRETO) -->
<div class="card" id="resultSection">
  <h2>Agendamentos</h2>

  <div id="loading" class="empty hidden">Carregando agendamentos...</div>
  <div id="empty" class="empty hidden">Nenhum agendamento encontrado.</div>

  <div class="table-wrapper">
    <table id="appointmentsTable" class="hidden">
      <thead>
        <tr>
          <th>Data</th>
          <th>Horário</th>
          <th>Barbeiro</th>
          <th>Cliente</th>
          <th>WhatsApp</th>
          <th>Status</th>
          <th>Ações</th>
        </tr>
      </thead>

      <tbody id="appointmentsBody"></tbody>
    </table>
  </div>
</div>
