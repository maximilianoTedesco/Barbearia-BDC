<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Horários | Barbearia BDC</title>

  <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Arial;
      background: #050505;
      color: #fff;
      padding: 20px;
    }

    .container {
      max-width: 1100px;
      margin: auto;
    }

    .card {
      background: #111;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      margin-bottom: 10px;
      background: #000;
      color: #fff;
      border: 1px solid #333;
    }

    button {
      padding: 10px;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .btn-primary { background: gold; }
    .btn-danger { background: red; color: #fff; }
    .btn-secondary { background: #333; color: #fff; }
    .btn-whatsapp { background: #25d366; }

    .hidden { display: none; }

    table {
      width: 100%;
      margin-top: 10px;
      border-collapse: collapse;
    }

    td, th {
      padding: 10px;
      border-bottom: 1px solid #333;
    }
  </style>
</head>

<body>

<div id="loginScreen" class="card">
  <h2>Admin</h2>
  <input type="password" id="adminPassword" placeholder="Senha"/>
  <button onclick="login()" class="btn-primary">Entrar</button>
</div>

<div id="adminScreen" class="container hidden">

  <div class="card">
    <h2>Filtros</h2>

    <input type="date" id="filterDate"/>

    <select id="filterBarber">
      <option value="">Todos</option>
      <option value="1f39cf56-9a40-42ee-a968-56f1537b47c3">Brunin</option>
      <option value="766b291c-4b4f-47ad-89e5-7893b1af0d28">Guilherme</option>
    </select>

    <select id="filterStatus">
      <option value="">Todos</option>
      <option value="scheduled">Agendado</option>
      <option value="cancelled">Cancelado</option>
    </select>

    <button onclick="loadAppointments()" class="btn-primary">Buscar</button>
  </div>

  <div class="card" id="resultSection">
    <h2>Agendamentos</h2>

    <div id="loading" class="hidden">Carregando...</div>
    <div id="empty" class="hidden">Nenhum resultado</div>

    <table id="appointmentsTable" class="hidden">
      <thead>
        <tr>
          <th>Data</th>
          <th>Hora</th>
          <th>Barbeiro</th>
          <th>Cliente</th>
          <th>WhatsApp</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="appointmentsBody"></tbody>
    </table>
  </div>

</div>

<script>
const SUPABASE_URL = "https://zbiitkbmdbcqoxeoyxdb.supabase.co";
const SUPABASE_KEY = "sb_publishable_5F9YjdTTbIMFYLyUj-64wA_d5PH8_z_";
const ADMIN_PASSWORD = "Brunin123*";

const BARBERS = {
  "1f39cf56-9a40-42ee-a968-56f1537b47c3": "Brunin",
  "766b291c-4b4f-47ad-89e5-7893b1af0d28": "Guilherme"
};

let supabase;

function getBarberName(id){
  return BARBERS[id] || "Barbeiro";
}

function login(){
  const pass = document.getElementById("adminPassword").value;
  if(pass !== ADMIN_PASSWORD) return alert("Senha errada");

  localStorage.setItem("admin","1");
  showAdmin();
}

function showAdmin(){
  document.getElementById("loginScreen").classList.add("hidden");
  document.getElementById("adminScreen").classList.remove("hidden");

  supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  loadAppointments();
}

async function loadAppointments(){
  document.getElementById("loading").classList.remove("hidden");
  document.getElementById("empty").classList.add("hidden");
  document.getElementById("appointmentsTable").classList.add("hidden");

  const date = document.getElementById("filterDate").value;
  const barber = document.getElementById("filterBarber").value;
  const status = document.getElementById("filterStatus").value;

  let query = supabase.from("appointments").select("*");

  if(date){
    query = query.gte("appointment_date", date+"T00:00:00")
                 .lte("appointment_date", date+"T23:59:59");
  }

  if(barber) query = query.eq("barber_id", barber);
  if(status) query = query.eq("status", status);

  const {data, error} = await query;

  document.getElementById("loading").classList.add("hidden");

  if(error){
    alert(error.message);
    return;
  }

  const body = document.getElementById("appointmentsBody");
  body.innerHTML = "";

  if(!data || data.length === 0){
    document.getElementById("empty").classList.remove("hidden");

    document.getElementById("resultSection").scrollIntoView({
      behavior:"smooth"
    });

    return;
  }

  data.forEach(item=>{
    const tr = document.createElement("tr");

    const barberName = getBarberName(item.barber_id);

    tr.innerHTML = `
      <td>${new Date(item.appointment_date).toLocaleDateString()}</td>
      <td>${new Date(item.appointment_date).toLocaleTimeString()}</td>
      <td>${barberName}</td>
      <td>${item.customer_name || "-"}</td>
      <td>${item.customer_whatsapp || "-"}</td>
      <td>
        <button class="btn-whatsapp" onclick="openWhatsapp('${item.customer_whatsapp}','${item.customer_name}','${barberName}')">Whats</button>
      </td>
    `;

    body.appendChild(tr);
  });

  document.getElementById("appointmentsTable").classList.remove("hidden");

  document.getElementById("resultSection").scrollIntoView({
    behavior:"smooth"
  });
}

function openWhatsapp(phone,name,barber){
  const msg = `Olá ${name}, sobre seu horário com ${barber}`;
  window.open(`https://wa.me/55${phone}?text=${encodeURIComponent(msg)}`);
}

window.onload = ()=>{
  if(localStorage.getItem("admin")) showAdmin();
}
</script>

</body>
</html>
