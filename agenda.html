<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agenda | Barbearia BDC</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background:
        linear-gradient(rgba(0,0,0,.75), rgba(0,0,0,.85)),
        url("hero.jpg") center/cover no-repeat;
      color: #fff;
      padding: 24px;
    }

    .container {
      max-width: 980px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 32px;
    }

    header h1 {
      font-size: 36px;
      color: #d4af37;
      margin-bottom: 8px;
    }

    header p {
      color: #ddd;
      font-size: 16px;
    }

    .agenda-box {
      background: rgba(20, 20, 20, 0.92);
      border: 1px solid rgba(212,175,55,.35);
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 20px 40px rgba(0,0,0,.45);
    }

    .section-title {
      font-size: 22px;
      color: #d4af37;
      margin-bottom: 16px;
    }

    .days {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 12px;
      margin-bottom: 28px;
    }

    .day-btn {
      background: #111;
      color: #fff;
      border: 1px solid #444;
      padding: 14px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 15px;
      transition: .2s;
    }

    .day-btn:hover,
    .day-btn.active {
      background: #d4af37;
      color: #111;
      border-color: #d4af37;
      font-weight: bold;
    }

    .times {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 12px;
      margin-bottom: 28px;
    }

    .time-btn {
      background: #181818;
      color: #fff;
      border: 1px solid #444;
      padding: 12px;
      border-radius: 10px;
      cursor: pointer;
      transition: .2s;
    }

    .time-btn:hover,
    .time-btn.active {
      background: #d4af37;
      color: #111;
      border-color: #d4af37;
      font-weight: bold;
    }

    form {
      display: grid;
      gap: 16px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      color: #d4af37;
      font-size: 14px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: 1px solid #444;
      background: #111;
      color: #fff;
      font-size: 15px;
      outline: none;
    }

    input:focus {
      border-color: #d4af37;
    }

    .submit-btn {
      margin-top: 10px;
      padding: 15px;
      border: none;
      border-radius: 12px;
      background: #d4af37;
      color: #111;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: .2s;
    }

    .submit-btn:hover {
      filter: brightness(1.1);
      transform: translateY(-1px);
    }

    .msg {
      margin-top: 16px;
      text-align: center;
      font-weight: bold;
      display: none;
    }

    .msg.success {
      display: block;
      color: #4ade80;
    }

    .msg.error {
      display: block;
      color: #f87171;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 22px;
      color: #d4af37;
      text-decoration: none;
      font-weight: bold;
    }

    .back-link:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <div class="container">
    <a href="index.html" class="back-link">← Voltar para o site</a>

    <header>
      <h1>Agende seu Horário</h1>
      <p>Escolha o dia, o horário e envie seus dados para agendamento.</p>
    </header>

    <main class="agenda-box">
      <h2 class="section-title">Escolha o dia da semana</h2>

      <div class="days" id="days">
        <button class="day-btn" data-day="Segunda-feira">Segunda</button>
        <button class="day-btn" data-day="Terça-feira">Terça</button>
        <button class="day-btn" data-day="Quarta-feira">Quarta</button>
        <button class="day-btn" data-day="Quinta-feira">Quinta</button>
        <button class="day-btn" data-day="Sexta-feira">Sexta</button>
        <button class="day-btn" data-day="Sábado">Sábado</button>
      </div>

      <h2 class="section-title">Escolha o horário</h2>

      <div class="times" id="times"></div>

      <h2 class="section-title">Seus dados</h2>

      <form id="agendaForm">
        <div class="form-group">
          <label for="nome">Nome completo</label>
          <input type="text" id="nome" placeholder="Digite seu nome" required />
        </div>

        <div class="form-group">
          <label for="apelido">Apelido</label>
          <input type="text" id="apelido" placeholder="Como prefere ser chamado?" required />
        </div>

        <div class="form-group">
          <label for="whatsapp">WhatsApp</label>
          <input type="tel" id="whatsapp" placeholder="Ex: 51999999999" required />
        </div>

        <button type="submit" class="submit-btn">Confirmar agendamento</button>

        <p id="msg" class="msg"></p>
      </form>
    </main>
  </div>

  <!-- Supabase preparado para integração futura -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    /*
      PARA INTEGRAR COM SUPABASE DEPOIS:

      1. Crie uma tabela chamada "appointments" ou "agenda"
      2. Colunas sugeridas:
         - id
         - name
         - nickname
         - whatsapp
         - weekday
         - time
         - status
         - created_at

      3. Depois preencha aqui:
    */

    const SUPABASE_URL = "COLE_AQUI_SUA_SUPABASE_URL";
    const SUPABASE_ANON_KEY = "COLE_AQUI_SUA_SUPABASE_ANON_KEY";

    // Quando for ativar de verdade, descomente:
    // const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let selectedDay = "";
    let selectedTime = "";

    const daysButtons = document.querySelectorAll(".day-btn");
    const timesContainer = document.getElementById("times");
    const form = document.getElementById("agendaForm");
    const msg = document.getElementById("msg");

    function generateTimes() {
      const startHour = 9;
      const endHour = 19;
      const interval = 40;

      let current = new Date();
      current.setHours(startHour, 0, 0, 0);

      let end = new Date();
      end.setHours(endHour, 0, 0, 0);

      while (current < end) {
        const hour = String(current.getHours()).padStart(2, "0");
        const minute = String(current.getMinutes()).padStart(2, "0");
        const time = `${hour}:${minute}`;

        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "time-btn";
        btn.textContent = time;
        btn.dataset.time = time;

        btn.addEventListener("click", () => {
          document.querySelectorAll(".time-btn").forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          selectedTime = time;
        });

        timesContainer.appendChild(btn);

        current.setMinutes(current.getMinutes() + interval);
      }
    }

    daysButtons.forEach(button => {
      button.addEventListener("click", () => {
        daysButtons.forEach(btn => btn.classList.remove("active"));
        button.classList.add("active");
        selectedDay = button.dataset.day;
      });
    });

    form.addEventListener("submit", async function(event) {
      event.preventDefault();

      const nome = document.getElementById("nome").value.trim();
      const apelido = document.getElementById("apelido").value.trim();
      const whatsapp = document.getElementById("whatsapp").value.trim();

      msg.className = "msg";
      msg.textContent = "";

      if (!selectedDay) {
        showMessage("Selecione um dia da semana.", "error");
        return;
      }

      if (!selectedTime) {
        showMessage("Selecione um horário.", "error");
        return;
      }

      if (!nome || !apelido || !whatsapp) {
        showMessage("Preencha todos os campos.", "error");
        return;
      }

      const appointmentData = {
        name: nome,
        nickname: apelido,
        whatsapp: whatsapp,
        weekday: selectedDay,
        time: selectedTime,
        status: "novo"
      };

      console.log("Dados prontos para Supabase:", appointmentData);

      /*
        INTEGRAÇÃO REAL COM SUPABASE:

        const { error } = await supabaseClient
          .from("appointments")
          .insert([appointmentData]);

        if (error) {
          showMessage("Erro ao agendar. Tente novamente.", "error");
          console.error(error);
          return;
        }
      */

      showMessage("Agendamento registrado com sucesso!", "success");

      form.reset();
      selectedDay = "";
      selectedTime = "";

      document.querySelectorAll(".day-btn").forEach(btn => btn.classList.remove("active"));
      document.querySelectorAll(".time-btn").forEach(btn => btn.classList.remove("active"));
    });

    function showMessage(text, type) {
      msg.textContent = text;
      msg.className = `msg ${type}`;
    }

    generateTimes();
  </script>
</body>
</html>
