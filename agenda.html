<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agenda | Barbearia BDC</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background:
        linear-gradient(rgba(0,0,0,.78), rgba(0,0,0,.9)),
        url("hero.jpg") center/cover no-repeat;
      color: #fff;
      padding: 24px;
    }

    .container {
      max-width: 980px;
      margin: 0 auto;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 22px;
      color: #d4af37;
      text-decoration: none;
      font-weight: bold;
    }

    header {
      text-align: center;
      margin-bottom: 32px;
    }

    header h1 {
      font-size: 36px;
      color: #d4af37;
      margin-bottom: 8px;
    }

    header p {
      color: #ddd;
      font-size: 16px;
    }

    .barber-selected {
      margin-top: 12px;
      color: #d4af37;
      font-weight: bold;
      font-size: 18px;
    }

    .agenda-box {
      background: rgba(20, 20, 20, 0.94);
      border: 1px solid rgba(212,175,55,.35);
      border-radius: 18px;
      padding: 28px;
    }

    .section-title {
      font-size: 22px;
      color: #d4af37;
      margin-bottom: 16px;
    }

    .days {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 12px;
      margin-bottom: 28px;
    }

    .day-btn, .time-btn {
      background: #111;
      color: #fff;
      border: 1px solid #444;
      padding: 14px;
      border-radius: 12px;
      cursor: pointer;
    }

    .day-btn.active,
    .time-btn.active {
      background: #d4af37;
      color: #000;
      font-weight: bold;
    }

    .times {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 12px;
      margin-bottom: 28px;
    }

    .empty-times {
      color: #bbb;
      margin-bottom: 28px;
    }

    input {
      padding: 14px;
      border-radius: 10px;
      border: 1px solid #444;
      background: #111;
      color: #fff;
    }

    .submit-btn {
      margin-top: 10px;
      padding: 15px;
      border: none;
      border-radius: 12px;
      background: #d4af37;
      color: #000;
      font-weight: bold;
      cursor: pointer;
    }

    .msg {
      margin-top: 16px;
      text-align: center;
      font-weight: bold;
      display: none;
    }

    .msg.success { display:block; color:#4ade80; }
    .msg.error { display:block; color:#f87171; }
  </style>
</head>

<body>
<div class="container">

<a href="barbeiros.html" class="back-link">← Voltar</a>

<header>
<h1>Agende seu Horário</h1>
<div id="barberSelected" class="barber-selected"></div>
</header>

<main class="agenda-box">

<h2 class="section-title">Escolha o dia</h2>
<div class="days">
<button class="day-btn" data-day="Segunda-feira">Segunda</button>
<button class="day-btn" data-day="Terça-feira">Terça</button>
<button class="day-btn" data-day="Quarta-feira">Quarta</button>
<button class="day-btn" data-day="Quinta-feira">Quinta</button>
<button class="day-btn" data-day="Sexta-feira">Sexta</button>
<button class="day-btn" data-day="Sábado">Sábado</button>
</div>

<h2 class="section-title">Horários</h2>
<div id="timesMessage" class="empty-times">Selecione um dia</div>
<div id="times" class="times"></div>

<h2 class="section-title">Seus dados</h2>

<form id="agendaForm">
<input id="nome" placeholder="Nome completo" required />
<input id="apelido" placeholder="Apelido" required />
<input id="whatsapp" placeholder="WhatsApp" required />
<button class="submit-btn" id="submitBtn">Confirmar</button>
<p id="msg" class="msg"></p>
</form>

</main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseClient = supabase.createClient(
"https://zbiitkbmdbcqoxeoyxdb.supabase.co",
"sb_publishable_5F9YjdTTbIMFYLyUj-64wA_d5PH8_z_"
);

const params = new URLSearchParams(window.location.search);
const barberId = params.get("barber_id");
const barbeiro = params.get("barbeiro");

document.getElementById("barberSelected").innerText = barbeiro;

let selectedDay="";
let selectedTime="";

const timesContainer=document.getElementById("times");
const timesMessage=document.getElementById("timesMessage");

function generateTimes(day){
timesContainer.innerHTML="";
selectedTime="";

let start=9,end=19;
if(day==="Segunda-feira"){start=14;end=20;}

let current=new Date();
current.setHours(start,0,0,0);

let limit=new Date();
limit.setHours(end,0,0,0);

while(current<limit){
let h=String(current.getHours()).padStart(2,"0");
let m=String(current.getMinutes()).padStart(2,"0");
let time=`${h}:${m}`;

let btn=document.createElement("button");
btn.type="button";
btn.className="time-btn";
btn.innerText=time;

btn.onclick=()=>{
document.querySelectorAll(".time-btn").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
selectedTime=time;
};

timesContainer.appendChild(btn);
current.setMinutes(current.getMinutes()+40);
}

timesMessage.style.display="none";
}

document.querySelectorAll(".day-btn").forEach(btn=>{
btn.onclick=()=>{
document.querySelectorAll(".day-btn").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");

selectedDay=btn.dataset.day;
generateTimes(selectedDay);
};
});

document.getElementById("agendaForm").onsubmit=async(e)=>{
e.preventDefault();

const nome=document.getElementById("nome").value;
const apelido=document.getElementById("apelido").value;
const whatsapp=document.getElementById("whatsapp").value;

if(!selectedDay || !selectedTime){
show("Selecione dia e horário","error");
return;
}

const {error}=await supabaseClient.from("appointments").insert([{
barber_id: barberId,
barber_name: barbeiro,
customer_name: nome,
customer_nickname: apelido,
customer_whatsapp: whatsapp,
weekday: selectedDay,
appointment_time: selectedTime,
status: "novo"
}]);

if(error){
show("Erro ao salvar","error");
return;
}

show("Agendamento salvo!","success");
};

function show(text,type){
const msg=document.getElementById("msg");
msg.innerText=text;
msg.className="msg "+type;
}
</script>

</body>
</html>
