<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agenda | Barbearia BDC</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background:
        linear-gradient(rgba(0,0,0,.78), rgba(0,0,0,.9)),
        url("hero.jpg") center/cover no-repeat;
      color: #fff;
      padding: 24px;
    }

    .container {
      max-width: 980px;
      margin: 0 auto;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 22px;
      color: #d4af37;
      text-decoration: none;
      font-weight: bold;
    }

    header {
      text-align: center;
      margin-bottom: 32px;
    }

    header h1 {
      font-size: 36px;
      color: #d4af37;
      margin-bottom: 8px;
    }

    header p {
      color: #ddd;
      font-size: 16px;
    }

    .barber-selected {
      margin-top: 12px;
      color: #d4af37;
      font-weight: bold;
      font-size: 18px;
    }

    .agenda-box {
      background: rgba(20, 20, 20, 0.94);
      border: 1px solid rgba(212,175,55,.35);
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 20px 40px rgba(0,0,0,.45);
    }

    .section-title {
      font-size: 22px;
      color: #d4af37;
      margin-bottom: 16px;
    }

    .days {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 12px;
      margin-bottom: 28px;
    }

    .day-btn,
    .time-btn {
      background: #111;
      color: #fff;
      border: 1px solid #444;
      padding: 14px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 15px;
      transition: .2s;
    }

    .day-btn:hover,
    .day-btn.active,
    .time-btn:hover,
    .time-btn.active {
      background: #d4af37;
      color: #111;
      border-color: #d4af37;
      font-weight: bold;
    }

    .times {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 12px;
      margin-bottom: 28px;
    }

    .empty-times {
      color: #bbb;
      margin-bottom: 28px;
      font-size: 15px;
    }

    form {
      display: grid;
      gap: 16px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      color: #d4af37;
      font-size: 14px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: 1px solid #444;
      background: #111;
      color: #fff;
      font-size: 15px;
      outline: none;
    }

    input:focus {
      border-color: #d4af37;
    }

    .submit-btn {
      margin-top: 10px;
      padding: 15px;
      border: none;
      border-radius: 12px;
      background: #d4af37;
      color: #111;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: .2s;
    }

    .submit-btn:disabled {
      opacity: .6;
      cursor: not-allowed;
    }

    .msg {
      margin-top: 16px;
      text-align: center;
      font-weight: bold;
      display: none;
    }

    .msg.success {
      display: block;
      color: #4ade80;
    }

    .msg.error {
      display: block;
      color: #f87171;
    }
  </style>
</head>

<body>
  <div class="container">
    <a href="barbeiros.html" class="back-link">← Voltar para barbeiros</a>

    <header>
      <h1>Agende seu Horário</h1>
      <p>Escolha o dia, o horário e envie seus dados.</p>
      <div id="barberSelected" class="barber-selected"></div>
    </header>

    <main class="agenda-box">
      <h2 class="section-title">Escolha o dia da semana</h2>

      <div class="days">
        <button type="button" class="day-btn" data-day="Segunda-feira">Segunda</button>
        <button type="button" class="day-btn" data-day="Terça-feira">Terça</button>
        <button type="button" class="day-btn" data-day="Quarta-feira">Quarta</button>
        <button type="button" class="day-btn" data-day="Quinta-feira">Quinta</button>
        <button type="button" class="day-btn" data-day="Sexta-feira">Sexta</button>
        <button type="button" class="day-btn" data-day="Sábado">Sábado</button>
      </div>

      <h2 class="section-title">Escolha o horário</h2>

      <div id="timesMessage" class="empty-times">
        Selecione primeiro um dia da semana.
      </div>

      <div class="times" id="times"></div>

      <h2 class="section-title">Seus dados</h2>

      <form id="agendaForm">
        <div class="form-group">
          <label for="nome">Nome completo</label>
          <input type="text" id="nome" placeholder="Digite seu nome" required />
        </div>

        <div class="form-group">
          <label for="apelido">Apelido</label>
          <input type="text" id="apelido" placeholder="Como prefere ser chamado?" required />
        </div>

        <div class="form-group">
          <label for="whatsapp">WhatsApp</label>
          <input type="tel" id="whatsapp" placeholder="Ex: 51999999999" required />
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">
          Confirmar agendamento
        </button>

        <p id="msg" class="msg"></p>
      </form>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const SUPABASE_URL = "https://zbiitkbmdbcqoxeoyxdb.supabase.co";
    const SUPABASE_KEY = "sb_publishable_5F9YjdTTbIMFYLyUj-64wA_d5PH8_z_";

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const params = new URLSearchParams(window.location.search);
    const barbeiro = params.get("barbeiro") || "Barbeiro";

    document.getElementById("barberSelected").textContent =
      "Barbeiro escolhido: " + barbeiro;

    let selectedDay = "";
    let selectedTime = "";

    const dayButtons = document.querySelectorAll(".day-btn");
    const timesContainer = document.getElementById("times");
    const timesMessage = document.getElementById("timesMessage");
    const form = document.getElementById("agendaForm");
    const msg = document.getElementById("msg");
    const submitBtn = document.getElementById("submitBtn");

    function generateTimes(day) {
      timesContainer.innerHTML = "";
      selectedTime = "";

      let startHour = 9;
      let endHour = 19;

      if (day === "Segunda-feira") {
        startHour = 14;
        endHour = 20;
      }

      const interval = 40;

      const current = new Date();
      current.setHours(startHour, 0, 0, 0);

      const end = new Date();
      end.setHours(endHour, 0, 0, 0);

      while (current < end) {
        const hour = String(current.getHours()).padStart(2, "0");
        const minute = String(current.getMinutes()).padStart(2, "0");
        const time = `${hour}:${minute}`;

        const button = document.createElement("button");
        button.type = "button";
        button.className = "time-btn";
        button.textContent = time;

        button.addEventListener("click", () => {
          document.querySelectorAll(".time-btn").forEach(btn => {
            btn.classList.remove("active");
          });

          button.classList.add("active");
          selectedTime = time;
        });

        timesContainer.appendChild(button);
        current.setMinutes(current.getMinutes() + interval);
      }

      timesMessage.style.display = "none";
    }

    dayButtons.forEach(button => {
      button.addEventListener("click", () => {
        dayButtons.forEach(btn => btn.classList.remove("active"));

        button.classList.add("active");
        selectedDay = button.dataset.day;

        generateTimes(selectedDay);
      });
    });

    form.addEventListener("submit", async function(event) {
      event.preventDefault();

      const nome = document.getElementById("nome").value.trim();
      const apelido = document.getElementById("apelido").value.trim();
      const whatsapp = document.getElementById("whatsapp").value.trim();

      msg.className = "msg";
      msg.textContent = "";

      if (!selectedDay) {
        showMessage("Selecione um dia da semana.", "error");
        return;
      }

      if (!selectedTime) {
        showMessage("Selecione um horário.", "error");
        return;
      }

      if (!nome || !apelido || !whatsapp) {
        showMessage("Preencha todos os campos.", "error");
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = "Salvando...";

      const appointmentData = {
        barber_name: barbeiro,
        customer_name: nome,
        customer_nickname: apelido,
        customer_whatsapp: whatsapp,
        weekday: selectedDay,
        appointment_time: selectedTime,
        status: "novo"
      };

      const { error } = await supabaseClient
        .from("appointments")
        .insert([appointmentData]);

      if (error) {
        console.error("Erro Supabase:", error);
        showMessage("Erro ao salvar agendamento. Verifique o Supabase.", "error");

        submitBtn.disabled = false;
        submitBtn.textContent = "Confirmar agendamento";
        return;
      }

      showMessage("Agendamento salvo com sucesso!", "success");

      form.reset();
      selectedDay = "";
      selectedTime = "";

      dayButtons.forEach(btn => btn.classList.remove("active"));
      timesContainer.innerHTML = "";
      timesMessage.style.display = "block";
      timesMessage.textContent = "Selecione primeiro um dia da semana.";

      submitBtn.disabled = false;
      submitBtn.textContent = "Confirmar agendamento";
    });

    function showMessage(text, type) {
      msg.textContent = text;
      msg.className = `msg ${type}`;
    }
  </script>
</body>
</html>
