<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agenda | Barbearia BDC</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background:
        linear-gradient(rgba(0,0,0,.78), rgba(0,0,0,.9)),
        url("hero.jpg") center/cover no-repeat;
      color: #fff;
      padding: 24px;
    }

    .container {
      max-width: 980px;
      margin: 0 auto;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 22px;
      color: #d4af37;
      text-decoration: none;
      font-weight: bold;
    }

    header {
      text-align: center;
      margin-bottom: 32px;
    }

    header h1 {
      font-size: 36px;
      color: #d4af37;
      margin-bottom: 8px;
    }

    .barber-selected {
      margin-top: 12px;
      color: #d4af37;
      font-weight: bold;
      font-size: 18px;
    }

    .agenda-box {
      background: rgba(20, 20, 20, 0.94);
      border: 1px solid rgba(212,175,55,.35);
      border-radius: 18px;
      padding: 28px;
    }

    .section-title {
      font-size: 22px;
      color: #d4af37;
      margin-bottom: 16px;
    }

    .date-input {
      width: 100%;
      margin-bottom: 28px;
    }

    .days {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 12px;
      margin-bottom: 28px;
    }

    .day-btn,
    .time-btn {
      background: #111;
      color: #fff;
      border: 1px solid #444;
      padding: 14px;
      border-radius: 12px;
      cursor: pointer;
    }

    .day-btn.active,
    .time-btn.active {
      background: #d4af37;
      color: #000;
      font-weight: bold;
    }

    .time-btn.ocupado {
      background: #555;
      color: #aaa;
      cursor: not-allowed;
      opacity: 0.6;
      text-decoration: line-through;
    }

    .times {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 12px;
      margin-bottom: 28px;
    }

    .empty-times {
      color: #bbb;
      margin-bottom: 28px;
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: 1px solid #444;
      background: #111;
      color: #fff;
      margin-bottom: 12px;
    }

    .submit-btn {
      width: 100%;
      margin-top: 10px;
      padding: 15px;
      border: none;
      border-radius: 12px;
      background: #d4af37;
      color: #000;
      font-weight: bold;
      cursor: pointer;
    }

    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .msg {
      margin-top: 16px;
      text-align: center;
      font-weight: bold;
      display: none;
    }

    .msg.success {
      display: block;
      color: #4ade80;
    }

    .msg.error {
      display: block;
      color: #f87171;
    }
  </style>
</head>

<body>
  <div class="container">
    <a href="barbeiros.html" class="back-link">← Voltar</a>

    <header>
      <h1>Agende seu Horário</h1>
      <div id="barberSelected" class="barber-selected"></div>
    </header>

    <main class="agenda-box">
      <h2 class="section-title">Escolha a data</h2>
      <input type="date" id="appointmentDate" class="date-input" required />

      <h2 class="section-title">Horários</h2>
      <div id="timesMessage" class="empty-times">Selecione uma data</div>
      <div id="times" class="times"></div>

      <h2 class="section-title">Seus dados</h2>

      <form id="agendaForm">
        <input id="nome" placeholder="Nome completo" required />
        <input id="apelido" placeholder="Apelido" required />
        <input id="whatsapp" placeholder="WhatsApp" required />
        <button class="submit-btn" id="submitBtn">Confirmar</button>
        <p id="msg" class="msg"></p>
      </form>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const supabaseClient = supabase.createClient(
      "https://zbiitkbmdbcqoxeoyxdb.supabase.co",
      "sb_publishable_5F9YjdTTbIMFYLyUj-64wA_d5PH8_z_"
    );

    const params = new URLSearchParams(window.location.search);
    const barberId = params.get("barber_id");
    const barbeiro = params.get("barbeiro");

    const barberSelected = document.getElementById("barberSelected");
    const appointmentDateInput = document.getElementById("appointmentDate");
    const timesContainer = document.getElementById("times");
    const timesMessage = document.getElementById("timesMessage");
    const agendaForm = document.getElementById("agendaForm");
    const submitBtn = document.getElementById("submitBtn");

    let selectedDate = "";
    let selectedDay = "";
    let selectedTime = "";

    barberSelected.innerText = barbeiro ? barbeiro : "Barbeiro não identificado";

    const hoje = new Date();
    const hojeFormatado = hoje.toISOString().split("T")[0];
    appointmentDateInput.min = hojeFormatado;

    function obterDiaSemana(dataISO) {
      const dias = [
        "Domingo",
        "Segunda-feira",
        "Terça-feira",
        "Quarta-feira",
        "Quinta-feira",
        "Sexta-feira",
        "Sábado"
      ];

      const [ano, mes, dia] = dataISO.split("-").map(Number);
      const data = new Date(ano, mes - 1, dia);

      return dias[data.getDay()];
    }

    async function buscarHorariosOcupados(barberId, appointmentDate) {
      const { data, error } = await supabaseClient
        .from("appointments")
        .select("appointment_time")
        .eq("barber_id", barberId)
        .eq("appointment_date", appointmentDate);

      if (error) {
        console.error("Erro ao buscar horários ocupados:", error);
        return [];
      }

      return data.map(item => item.appointment_time);
    }

    async function generateTimes() {
      timesContainer.innerHTML = "";
      selectedTime = "";

      if (!barberId || !barbeiro) {
        timesMessage.innerText = "Barbeiro não identificado. Volte e selecione um barbeiro novamente.";
        timesMessage.style.display = "block";
        return;
      }

      if (!selectedDate) {
        timesMessage.innerText = "Selecione uma data";
        timesMessage.style.display = "block";
        return;
      }

      selectedDay = obterDiaSemana(selectedDate);

      if (selectedDay === "Domingo") {
        timesMessage.innerText = "Não atendemos aos domingos.";
        timesMessage.style.display = "block";
        return;
      }

      let start = 9;
      let end = 19;

      if (selectedDay === "Segunda-feira") {
        start = 14;
        end = 20;
      }

      const horariosOcupados = await buscarHorariosOcupados(barberId, selectedDate);

      let current = new Date();
      current.setHours(start, 0, 0, 0);

      let limit = new Date();
      limit.setHours(end, 0, 0, 0);

      while (current < limit) {
        const h = String(current.getHours()).padStart(2, "0");
        const m = String(current.getMinutes()).padStart(2, "0");
        const time = `${h}:${m}`;

        const ocupado = horariosOcupados.includes(time);

        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = ocupado ? "time-btn ocupado" : "time-btn";
        btn.innerText = ocupado ? `${time} Ocupado` : time;
        btn.disabled = ocupado;

        if (!ocupado) {
          btn.onclick = () => {
            document.querySelectorAll(".time-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            selectedTime = time;
          };
        }

        timesContainer.appendChild(btn);
        current.setMinutes(current.getMinutes() + 40);
      }

      timesMessage.style.display = "none";
    }

    appointmentDateInput.addEventListener("change", async () => {
      selectedDate = appointmentDateInput.value;
      await generateTimes();
    });

    agendaForm.onsubmit = async (e) => {
      e.preventDefault();

      const nome = document.getElementById("nome").value.trim();
      const apelido = document.getElementById("apelido").value.trim();
      const whatsapp = document.getElementById("whatsapp").value.trim();

      if (!selectedDate || !selectedDay || !selectedTime) {
        show("Selecione data e horário.", "error");
        return;
      }

      submitBtn.disabled = true;
      submitBtn.innerText = "Salvando...";

      const { error } = await supabaseClient.from("appointments").insert([{
        barber_id: barberId,
        barber_name: barbeiro,
        customer_name: nome,
        customer_nickname: apelido,
        customer_whatsapp: whatsapp,
        weekday: selectedDay,
        appointment_date: selectedDate,
        appointment_time: selectedTime,
        status: "novo"
      }]);

      if (error) {
        console.error("Erro ao salvar:", error);

        if (error.code === "23505") {
          show("Esse horário acabou de ser ocupado. Escolha outro horário.", "error");
          await generateTimes();
        } else {
          show("Erro ao salvar agendamento.", "error");
        }

        submitBtn.disabled = false;
        submitBtn.innerText = "Confirmar";
        return;
      }

      show("Agendamento salvo com sucesso!", "success");
      agendaForm.reset();
      selectedDate = "";
      selectedDay = "";
      selectedTime = "";
      timesContainer.innerHTML = "";
      timesMessage.innerText = "Selecione uma data";
      timesMessage.style.display = "block";

      submitBtn.disabled = false;
      submitBtn.innerText = "Confirmar";
    };

    function show(text, type) {
      const msg = document.getElementById("msg");
      msg.innerText = text;
      msg.className = "msg " + type;
    }
  </script>
</body>
</html>
