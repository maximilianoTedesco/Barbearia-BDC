<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Agenda | Barbearia BDC</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
min-height:100vh;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(rgba(0,0,0,.78), rgba(0,0,0,.9)),
url("hero.jpg") center/cover no-repeat;
color:#fff;
padding:24px;
}

.container{max-width:980px;margin:0 auto;}

.back-link{
display:inline-block;
margin-bottom:22px;
color:#d4af37;
text-decoration:none;
font-weight:bold;
}

header{text-align:center;margin-bottom:32px;}

header h1{font-size:36px;color:#d4af37;margin-bottom:8px;}

.barber-selected{
margin-top:12px;
color:#d4af37;
font-weight:bold;
font-size:18px;
}

.agenda-box{
background:rgba(20,20,20,.94);
border:1px solid rgba(212,175,55,.35);
border-radius:18px;
padding:28px;
}

.section-title{
font-size:22px;
color:#d4af37;
margin-bottom:16px;
}

.days{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(135px,1fr));
gap:12px;
margin-bottom:28px;
}

.day-btn,.time-btn{
background:#111;
color:#fff;
border:1px solid #444;
padding:14px;
border-radius:12px;
cursor:pointer;
font-weight:bold;
}

.day-btn span{
display:block;
font-size:13px;
color:#bbb;
margin-top:4px;
}

.day-btn.active,.time-btn.active{
background:#d4af37;
color:#000;
border-color:#d4af37;
}

.time-btn.ocupado{
background:#555;
color:#aaa;
cursor:not-allowed;
opacity:.6;
text-decoration:line-through;
}

.times{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(100px,1fr));
gap:12px;
margin-bottom:28px;
}

.empty-times{
color:#bbb;
margin-bottom:28px;
font-size:18px;
}

input{
width:100%;
padding:14px;
border-radius:10px;
border:1px solid #444;
background:#111;
color:#fff;
margin-bottom:12px;
}

.submit-btn{
width:100%;
margin-top:10px;
padding:15px;
border:none;
border-radius:12px;
background:#d4af37;
color:#000;
font-weight:bold;
cursor:pointer;
}

.whatsapp-btn{
width:100%;
margin-top:10px;
padding:15px;
border:none;
border-radius:12px;
background:#25D366;
color:#fff;
font-weight:bold;
cursor:pointer;
}

.msg{
margin-top:16px;
text-align:center;
font-weight:bold;
display:none;
}

.msg.success{display:block;color:#4ade80;}
.msg.error{display:block;color:#f87171;}

.popup-overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.75);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
padding:20px;
}

.popup-box{
background:#111;
border:1px solid rgba(212,175,55,.55);
border-radius:18px;
padding:28px;
max-width:360px;
width:100%;
text-align:center;
box-shadow:0 0 30px rgba(0,0,0,.6);
}

.popup-box h3{
color:#d4af37;
font-size:24px;
margin-bottom:12px;
}

.popup-box p{
color:#fff;
font-size:16px;
margin-bottom:22px;
line-height:1.4;
}

.popup-box button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#d4af37;
color:#000;
font-weight:bold;
cursor:pointer;
}
  
</style>
</head>

<body>
<div class="container">

<a href="barbeiros.html" class="back-link">← Voltar</a>

<header>
<h1>Agende seu Horário</h1>
<div id="barberSelected" class="barber-selected"></div>
</header>

<main class="agenda-box">

<div id="popupConfirmacao" class="popup-overlay">
  <div class="popup-box">
    <h3>Agendamento confirmado!</h3>
    <p>Seu horário foi salvo com sucesso.</p>
    <button id="popupOkBtn">OK</button>
  </div>
</div>
  
<h2 class="section-title">Escolha o dia</h2>
<div id="days" class="days"></div>

<h2 id="horariosTitulo" class="section-title">Horários</h2>
<div id="timesMessage" class="empty-times">Selecione um dia</div>
<div id="times" class="times"></div>

<h2 class="section-title">Seus dados</h2>

<form id="agendaForm">
<input id="nome" placeholder="Nome completo" required />
<input id="apelido" placeholder="Apelido" required />
<input id="whatsapp" placeholder="WhatsApp" required />
<button class="submit-btn" id="submitBtn">Confirmar</button>

<button type="button" id="cancelWhatsappBtn" class="whatsapp-btn">
Desmarcar pelo WhatsApp
</button>

<p id="msg" class="msg"></p>
</form>

</main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseClient = supabase.createClient(
"https://zbiitkbmdbcqoxeoyxdb.supabase.co",
"sb_publishable_5F9YjdTTbIMFYLyUj-64wA_d5PH8_z_"
);

const telefoneBarbearia="5551989096675";

const params=new URLSearchParams(window.location.search);
const barberId=params.get("barber_id");
const barbeiro=params.get("barbeiro");

const barberSelected=document.getElementById("barberSelected");
const daysContainer=document.getElementById("days");
const timesContainer=document.getElementById("times");
const timesMessage=document.getElementById("timesMessage");
const horariosTitulo=document.getElementById("horariosTitulo");
const agendaForm=document.getElementById("agendaForm");
const submitBtn=document.getElementById("submitBtn");
const cancelBtn=document.getElementById("cancelWhatsappBtn");
const popupConfirmacao=document.getElementById("popupConfirmacao");
const popupOkBtn=document.getElementById("popupOkBtn");

let selectedDate="";
let selectedDay="";
let selectedTime="";

barberSelected.innerText=barbeiro;

const diasSemana=["Domingo","Segunda-feira","Terça-feira","Quarta-feira","Quinta-feira","Sexta-feira","Sábado"];

function formatISO(d){
return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}

function formatBR(d){
return `${String(d.getDate()).padStart(2,"0")}/${String(d.getMonth()+1).padStart(2,"0")}`;
}

function rolarParaHorarios(){
setTimeout(()=>{
horariosTitulo.scrollIntoView({
behavior:"smooth",
block:"start"
});
},200);
}

function gerarDias(){
let diasCriados=0,cont=0;

while(diasCriados<7){
let d=new Date();
d.setDate(d.getDate()+cont);

let nome=diasSemana[d.getDay()];
if(nome!=="Domingo"){
let btn=document.createElement("button");
btn.className="day-btn";
btn.dataset.date=formatISO(d);
btn.dataset.day=nome;

let label=nome.replace("-feira","");
if(cont===0)label="Hoje";
if(cont===1)label="Amanhã";

btn.innerHTML=`${label}<span>${nome} - ${formatBR(d)}</span>`;

btn.onclick=async()=>{
document.querySelectorAll(".day-btn").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");

selectedDate=btn.dataset.date;
selectedDay=btn.dataset.day;
selectedTime="";

await gerarHorarios();
rolarParaHorarios();
};

daysContainer.appendChild(btn);
diasCriados++;
}
cont++;
}
}

async function buscarOcupados(){
const {data}=await supabaseClient
.from("appointments")
.select("appointment_time")
.eq("barber_id",barberId)
.eq("appointment_date",selectedDate);

return data.map(i=>i.appointment_time);
}

async function gerarHorarios(){
timesContainer.innerHTML="";

let start=9,end=19;
if(selectedDay==="Segunda-feira"){start=14;end=20;}

let ocupados=await buscarOcupados();
let agora=new Date();
let hoje=formatISO(agora);

let current=new Date();
current.setHours(start,0,0,0);

let limit=new Date();
limit.setHours(end,0,0,0);

while(current<limit){
let h=String(current.getHours()).padStart(2,"0");
let m=String(current.getMinutes()).padStart(2,"0");
let time=`${h}:${m}`;

let passado=(selectedDate===hoje && current<agora);
let ocupado=ocupados.includes(time)||passado;

let btn=document.createElement("button");
btn.className=ocupado?"time-btn ocupado":"time-btn";
btn.innerText=ocupado?`${time}\nIndisponível`:time;
btn.disabled=ocupado;

if(!ocupado){
btn.onclick=()=>{
document.querySelectorAll(".time-btn").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
selectedTime=time;
};
}

timesContainer.appendChild(btn);
current.setMinutes(current.getMinutes()+40);
}

timesMessage.style.display="none";
}

agendaForm.onsubmit=async(e)=>{
e.preventDefault();

let nome=document.getElementById("nome").value;
let apelido=document.getElementById("apelido").value;
let whatsapp=document.getElementById("whatsapp").value;

if(!selectedTime){
show("Selecione horário","error");
return;
}

submitBtn.disabled=true;

const {error}=await supabaseClient.from("appointments").insert([{
barber_id:barberId,
barber_name:barbeiro,
customer_name:nome,
customer_nickname:apelido,
customer_whatsapp:whatsapp,
weekday:selectedDay,
appointment_date:selectedDate,
appointment_time:selectedTime,
status:"novo"
}]);

if(error){
show("Erro ao salvar","error");
submitBtn.disabled=false;
return;
}

popupConfirmacao.style.display="flex";
};

cancelBtn.onclick = () => {
  const nome = document.getElementById("nome").value.trim();
  const whatsapp = document.getElementById("whatsapp").value.trim();

  if (!nome) {
    show("Informe seu nome para solicitar a desmarcação.", "error");
    return;
  }

  if (!whatsapp) {
    show("Informe seu WhatsApp para solicitar a desmarcação.", "error");
    return;
  }

  const mensagem = `
Olá! Quero desmarcar meu horário.

Nome: ${nome}
WhatsApp: ${whatsapp}
Barbeiro: ${barbeiro}
`;

  const url = `https://wa.me/${telefoneBarbearia}?text=${encodeURIComponent(mensagem)}`;
  window.open(url, "_blank");
};

popupOkBtn.onclick=()=>{
const nome = document.getElementById("nome").value;

const mensagem = `Acabei de agendar um horário com o barbeiro ${barbeiro}.
Dia: ${selectedDay}
Horário: ${selectedTime}
Cliente: ${nome}`;

const url = `https://wa.me/${telefoneBarbearia}?text=${encodeURIComponent(mensagem)}`;

window.open(url, "_blank");

setTimeout(()=>{
window.location.reload();
},1000);
};
  
function show(t,type){
const msg=document.getElementById("msg");
msg.innerText=t;
msg.className="msg "+type;
}

gerarDias();
</script>

</body>
</html>
